<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>与你相伴 · 心意音乐</title>
    <link href="https://tv.speechb.com/expression_templates/cover/heart.png" rel="shortcut icon"/>
    <meta name="keywords" content="抖音超火的HTML表白模板，表白情书，恋爱话术，表白，表白情书在线制作，表白信封"/>
    <meta name="description" content="抖音超火的HTML表白模板在线制作，只需书写你想要表达的情感文字，点击制作即可传达给心爱的ta"/>

    <script>
        //判断客户端设备，选择写入meta
        function init_viewport(){
            if(navigator.userAgent.indexOf('Android') != -1){
                var version = parseFloat(RegExp.$1);
                if(version>2.3){
                    var width = window.outerWidth == 0 ? window.screen.width : window.outerWidth;
                    var phoneScale = parseInt(width)/500;
                    document.write('<meta name="viewport" content="width=500, minimum-scale = '+ phoneScale +', maximum-scale = '+ phoneScale +', target-densitydpi=device-dpi">');
                }else{
                    document.write('<meta name="viewport" content="width=500, target-densitydpi=device-dpi, user-scalable=0">');
                }
            }else if(navigator.userAgent.indexOf('iPhone') != -1){
                var phoneScale = parseInt(window.screen.width)/500;
                document.write('<meta name="viewport" content="width=500, min-height=750, initial-scale=' + phoneScale +', maximum-scale='+phoneScale+', user-scalable=0" /> ');
            }else{
                document.write('<meta name="viewport" content="width=500, height=750, initial-scale=0.64" /> ');
            }
        }
        init_viewport();
    </script> 

    <style>
        * {
            padding: 0px;
            margin: 0px;
            -webkit-box-sizing: border-box;
        } 
        body {
            background-color: white;
        }
        a {
            color: white;
            text-decoration: none; 
        }

        #div_container {
            width: 500px;
            margin: 0px auto; 
            position: relative; 
            font-size: 1em;
        }

        .div_pure_words {
            position: relative;
            display: none;
        }
        .div_pure_words_bg {
            background-repeat: repeat; 
            background-size: 100%; 
            background-attachment: fixed; 
            width: 500px;
            min-height: 500px; 
        }
        .div_pure_words_height {
            visibility: hidden;
            padding: 30px; 
            text-align: justify;
            white-space: pre-wrap;
            font-size: 1.1em;
            font-family: "Microsoft YaHei","Arial";
            color: white; 
        }
        .div_pw_typed {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            width: 500px;            
            background:rgba(255,255,255,0.8);
            padding: 30px; 
            text-align: justify;
        } 
        #span_pw_typed {
            width:100%; 
            white-space:pre-wrap; 
            font-size: 1.1em;
            font-family: "Microsoft YaHei","Arial";
        }

        #div_start_bg{
            width: 100%; height: 100%;
            position: absolute;
            left: 0px; top: 0px;
            z-index: 44;

        }

        /* ----- 按钮公共样式 (内嵌，原外部文件已整合) ----- */
        #div_btn_container {
            position: relative;
            width: 100%;
            margin-top: 20px;
            text-align: center;
        }
        #div_btn_inner {
            display: flex;
            justify-content: center;
            align-items: center;

            padding: 15px 0;
        }
        .div_btn {
            display: inline-block;
            width: 60px;

            background-color: #ff6b81;
            color: white;

        }
        #img_music {
            width: 35px;
            height: 35px;
            margin-top: 12px;
        }
        @-webkit-keyframes music_play_rotate {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }

        /* ----- 片头 onlyyou 样式 (内嵌) ----- */
        #div_onlyyou {
            display: none;
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;

        }
        #div_oy_inner {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }
        .div_oy_text h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }
        .img_oy_text {
            max-width: 180px;
            border-radius: 20px;
            margin: 15px 0;
        }
        .p_oy_text {
            font-size: 20px;
            margin-bottom: 30px;
        }
        #ul_oy_btn {
            list-style: none;
            display: flex;
            gap: 30px;
        }
        #ul_oy_btn li {
            background: #ff6b81;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #ul_oy_btn li:hover {
            background: #ff4757;
        }
        #div_oy_note, #div_oy_yes {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 25px 30px;
            border-radius: 20px;
            text-align: center;
            font-size: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 100;
            display: none;
        }
        #div_oy_note img, #div_oy_yes img {
            width: 80px;
            margin-bottom: 10px;
        }
        #div_oy_note_close {
            position: absolute;
            top: 5px; right: 12px;
            font-size: 24px;
            cursor: pointer;
        }

        /* ----- 新增：音乐替换窗口 (悬浮卡片) ----- */
        #music_edit_panel {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 420px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 999;
            display: none;
            padding: 25px 20px;
            text-align: center;
            border: 2px solid #ffb8c6;
        }
        #music_edit_panel h3 {
            color: #ff4757;
            margin-bottom: 20px;
            font-size: 24px;
        }
        #music_edit_panel input {
            width: 90%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid #ffb8c6;
            border-radius: 50px;
            outline: none;
            margin-bottom: 20px;
            background: #fff5f7;
        }
        #music_edit_panel input:focus {
            border-color: #ff6b81;
        }
        .panel_btn_group {
            display: flex;
            justify-content: space-around;
        }
        .panel_btn {
            background: #ff6b81;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(255,107,129,0.4);
            min-width: 120px;
        }
        .panel_btn.cancel {
            background: #b2bec3;
            box-shadow: none;
        }
        #music_edit_overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 998;
            display: none;
        }
        /* 新增浮动换歌按钮 (位于右下角) */
        #btn_change_music {
            position: fixed;
            bottom: 25px;
            right: 20px;
            width: 55px;
            height: 55px;
            border-radius: 30px;
            background: #ff6b81;
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            line-height: 55px;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(255,107,129,0.5);
            z-index: 200;
            border: 2px solid white;
            transition: 0.2s;
        }
        #btn_change_music:hover {
            background: #ff4757;
            transform: scale(1.1);
        }
        /* 音乐提示小字 */
        .div_music_tips {
            display: none;
        }
    </style>
</head>

<body>
<div id="div_container">

    <div id="div_start_bg"></div>

    <!-- 片头互动区域 -->
    <div id="div_onlyyou">
        <div id="div_oy_inner">
            <div class="div_oy_text">
                <h1>大聪明，你竟然发现了彩蛋💕</h1>
                <img class="img_oy_text" src="https://tv.speechb.com/expression_templates/cover/heart.png" alt="爱心">
                <p class="p_oy_text">和我永远在一起，好不好≽^•༚• ྀི≼💕</p>
                <ul id="ul_oy_benefit" style="display:none;">
                    <!-- 彩蛋文字占位 -->
                </ul>
            </div>
            <ul id="ul_oy_btn">
                <li onclick="oy_go_next()">Yes&nbsp;&nbsp;❤</li>
                <li onclick="oy_show_benefit()">No&nbsp;&nbsp;✖</li>
            </ul>
            <div id="div_oy_note" onclick="oy_hide_note()">
                <img src="https://tv.speechb.com/expression_templates/cover/heart.png" alt=""><br>
                请告诉我Yes！
                <div id="div_oy_note_close">✖</div>
            </div>
            <div id="div_oy_yes">
                <img src="https://tv.speechb.com/expression_templates/cover/heart.png" alt=""><br>
                太好了！哈哈~
            </div>
        </div>
    </div>

    <!-- 正文区域 -->
    <div class="div_pure_words">
        <div class="div_pure_words_bg">
            <div class="div_pure_words_height">
                真的好喜欢你啊，让我们一起努力的走下去吧，尽力呵护好这段感情(★≧▽^))★☆
            </div>
        </div>
        <div class="div_pw_typed">
            <span id="span_pw_typed"></span>
        </div>
    </div>

    <!-- 底部按钮栏 -->
    <div id='div_btn_container'>
        <div id="div_btn_inner">
            <div class='div_music_tips'></div>
            <div class="div_btn" id="div_music" onclick="music_switch()">
                <img id='img_music' src='https://tv.speechb.com/expression_templates/cover/heart.png' style='-webkit-animation:music_play_rotate 1s linear infinite; width:30px; margin-top:15px;'>
                <audio id="audio_music" autoplay="autoplay" loop>
                    <source type="audio/mpeg"/>  
                </audio>
            </div>

            <div class='div_record_tips'></div>
            <div class="div_btn" id="div_record" onclick="record_switch()">
                语音
                <audio id="audio_record" loop>
                    <source type="audio/mpeg"/>  
                </audio>
            </div>
        </div>
    </div>
</div>

<!-- 悬浮“换音乐”按钮 -->
<div id="btn_change_music" onclick="openMusicPanel()">🎵换</div>

<!-- 音乐替换面板 + 遮罩 -->
<div id="music_edit_overlay" onclick="closeMusicPanel()"></div>
<div id="music_edit_panel">
    <h3>💖 更换背景音乐</h3>
    <input type="text" id="new_music_url" placeholder="输入 mp3 链接 (https://...)" value="">
    <div class="panel_btn_group">
        <button class="panel_btn" onclick="applyNewMusic()">确认更换</button>
        <button class="panel_btn cancel" onclick="closeMusicPanel()">取消</button>
    </div>
    <p style="font-size:12px; color:#999; margin-top:18px;">推荐使用直链，如遇无法播放请检查链接</p>
</div>

<!-- 依赖库 -->
<script src="https://tv.speechb.com/static/love_temp/douyin/js/jquery-2.0.3.min.js"></script>
<script src="https://tv.speechb.com/static/love_temp/douyin/js/typed.min.js"></script>

<script>
    // ---------- 全局变量 & 初始化配置 ----------
    var window_height = $(window).height();
    var theme = 'pure_words';
    var theme_content = {
        "pure_words_content": "真的好喜欢你啊，让我们一起努力的走下去吧，尽力呵护好这段感情(★≧▽^))★☆",
        "typed_bool": "typed_y",
        "cursor_char": "cursor_heart",
        "bg_style_pure_words": "bg_opacity",
        "bg_img": "https://tv.speechb.com/static/love_temp/douyin/images/3.jpg"
    };

    // 默认音乐配置 (可修改)
    var music_json = {
        "music_select": "m_online",
        "m_online_id": "7",
        "m_online_url": "https://tv.speechb.com//expression_templates/music/rongqi.mp3",
        "m_upload_name": "null",
        "m_upload_url": "null"
    };

    var record_json = { "record_bool": "r_false" };

    // 片头配置
    var start_content = {
        "chase_title": "大聪明，你竟然发现了彩蛋💕",
        "chase_text": "和我永远在一起，好不好≽^•༚• ྀི≼💕",
        "chase_benefit": ["真的吗？真的吗→_→","不要啊m9( ｀д´ )!!!!","第三次了，大包子→_→","这是你最后的机会了"],
        "bg_style": "bg_custom",
        "bg_img": "https://tv.speechb.com/static/love_temp/douyin/images/2.jpg",
        "img_bool": "img_true",
        "img_src": "https://tv.speechb.com/static/love_temp/douyin/images/1.gif"
    };

    var start_id = 'onlyyou';
    var pure_words_content = theme_content['pure_words_content'];
    var str_cursorChar = '❤';
    var typed_bool = true;

    // ---------- 音乐控制 (重写简易版，不依赖外部theme_common) ----------
    var musicPlaying = true;
    var audioElement = document.getElementById('audio_music');

    function initMusic() {
        var src = music_json.m_online_url;
        if (src && src !== 'null' && src !== '') {
            audioElement.src = src;
            audioElement.load();
            // 尝试自动播放 (用户交互后才能真正播放)
            audioElement.play().then(() => {
                musicPlaying = true;
                $('#img_music').css('-webkit-animation', 'music_play_rotate 1s linear infinite');
            }).catch(e => {
                musicPlaying = false;
                $('#img_music').css('-webkit-animation', 'none');
                console.log('自动播放被阻止，等待用户手势');
            });
        }
    }

    window.music_switch = function() {
        if (musicPlaying) {
            audioElement.pause();
            musicPlaying = false;
            $('#img_music').css('-webkit-animation', 'none');
        } else {
            audioElement.play().then(() => {
                musicPlaying = true;
                $('#img_music').css('-webkit-animation', 'music_play_rotate 1s linear infinite');
            }).catch(e => {});
        }
    };

    window.record_switch = function() {
        alert('录音功能暂未开放，可以用音乐表白哦~');
    };

    // ---------- 新增：音乐替换功能 ----------
    function openMusicPanel() {
        $('#music_edit_overlay').fadeIn(200);
        $('#music_edit_panel').fadeIn(200);
        // 预填当前链接
        $('#new_music_url').val(audioElement.src || music_json.m_online_url);
    }

    function closeMusicPanel() {
        $('#music_edit_overlay').fadeOut(200);
        $('#music_edit_panel').fadeOut(200);
    }

    function applyNewMusic() {
        var newUrl = $('#new_music_url').val().trim();
        if (!newUrl) {
            alert('请输入有效的音乐链接');
            return;
        }
        // 简单校验是否是http/https开头
        if (!newUrl.startsWith('http://') && !newUrl.startsWith('https://')) {
            alert('链接需以 http:// 或 https:// 开头');
            return;
        }
        // 更新音乐源
        audioElement.src = newUrl;
        audioElement.load();
        music_json.m_online_url = newUrl;  // 同步配置
        
        // 尝试播放新音乐
        audioElement.play().then(() => {
            musicPlaying = true;
            $('#img_music').css('-webkit-animation', 'music_play_rotate 1s linear infinite');
            closeMusicPanel();
            // 简单提示
            alert('🎵 音乐已更换，正在播放~');
        }).catch(err => {
            // 如果自动播放失败，至少保证下次点击按钮能播
            musicPlaying = false;
            $('#img_music').css('-webkit-animation', 'none');
            closeMusicPanel();
            alert('音乐链接已更新，点击🎵按钮即可播放 (浏览器限制自动播放)');
        });
    }

    // ---------- 片头互动 (onlyyou) ----------
    var benefitIndex = 0;
    window.oy_go_next = function() {
        $('#div_oy_yes').fadeIn(300);
        setTimeout(function() {
            $('#div_oy_yes').fadeOut();
            $('#div_onlyyou').fadeOut(600);
            $('#div_start_bg').fadeOut(600);
            init_pure_words();
        }, 1500);
    };

    window.oy_show_benefit = function() {
        var benefits = start_content.chase_benefit;
        if (benefitIndex < benefits.length) {
            $('#div_oy_note').find('br').before(benefits[benefitIndex]);
            $('#div_oy_note img').attr('src', 'https://tv.speechb.com/expression_templates/cover/heart.png');
            benefitIndex++;
        } else {
            $('#div_oy_note').find('br').before('好吧，再给你一次机会~');
        }
        $('#div_oy_note').fadeIn();
    };

    window.oy_hide_note = function() {
        $('#div_oy_note').fadeOut();
    };

    function init_onlyyou() {
        // 设置背景图
        if (start_content.bg_style === 'bg_custom' && start_content.bg_img) {
            $('#div_onlyyou').css('background-image', 'url(' + start_content.bg_img + ')');
        }
        $('.div_oy_text h1').text(start_content.chase_title);
        $('.p_oy_text').text(start_content.chase_text);
        if (start_content.img_bool === 'img_true' && start_content.img_src) {
            $('.img_oy_text').attr('src', start_content.img_src);
        }
        $('#div_onlyyou').show();
    }

    // ---------- 打字效果正文 ----------
    var interval_pw_height;
    function init_pure_words() {
        $(".div_pure_words_height").html(pure_words_content + '22222');
        
        if (theme_content.bg_style_pure_words === 'bg_opacity' && theme_content.bg_img) {
            $(".div_pure_words_bg").css({"background-image": "url("+theme_content.bg_img+")"});
        }

        if (theme_content.cursor_char === 'cursor_heart') str_cursorChar = '❤';
        typed_bool = (theme_content.typed_bool === 'typed_y');

        if (typed_bool) {
            new Typed('#span_pw_typed', {
                strings: [pure_words_content],
                typeSpeed: 120,
                cursorChar: str_cursorChar,
                contentType: 'html',
                onComplete: function() { console.log('打字完成'); }
            });
        } else {
            $("#span_pw_typed").html(pure_words_content).fadeIn();
        }

        $(".div_pure_words").fadeIn();

        var height_div_pw = $(".div_pure_words_height").height();
        interval_pw_height = setInterval(function(){
            var least_height = $('.div_pure_words_height').height();
            if (least_height > height_div_pw) {
                height_div_pw = least_height;
            } else {
                clearInterval(interval_pw_height);
                $(".div_pure_words_height").height(least_height + 100);
                if ($(".div_pure_words_height").height() < window_height) {
                    $(".div_pure_words_height").height(window_height);
                }
            }
        }, 100);
    }

    // ---------- 启动 ----------
    $(function(){
        init_onlyyou();
        initMusic();
        
        // 如果用户直接点击Yes，会进入init_pure_words，音乐已经在播放
        
        // 为音乐按钮添加图标旋转控制 (配合music_switch)
    });

    // 辅助：如果用户点击页面任意位置尝试恢复自动播放 (用户手势)
    $(document).one('click', function() {
        if (audioElement.paused && audioElement.src && music_json.m_online_url) {
            audioElement.play().then(() => {
                musicPlaying = true;
                $('#img_music').css('-webkit-animation', 'music_play_rotate 1s linear infinite');
            }).catch(()=>{});
        }
    });

    // 兼容外部可能调用的函数
    window.init_start = function(id) {
        if (id === 'onlyyou') {
            // 已经初始化
        } else {
            $('#div_start_bg').fadeOut();
            init_pure_words();
        }
    };

    // 覆盖可能被调用的音乐初始化 (如果有theme_common会冲突，这里内联处理)
    window.music_init = function() {}; // 空函数防止报错
</script>

<!-- 内联补充一些缺失的样式/图片 -->
<style>
    /* 保证移动端圆角及色彩 */
    #ul_oy_benefit { display: none; }
    .div_oy_text { color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
    #div_oy_note, #div_oy_yes { background: #fff0f3; border-radius: 30px; }
    #div_oy_note_close { color: #ff6b81; }
    /* 音乐替换面板适应移动端 */
    @media (max-width: 500px) {
        #music_edit_panel { width: 90%; }
        #btn_change_music { bottom: 15px; right: 15px; }
    }
    #btn_change_music {
        display: block;
        background: #ff6b81;
        font-size: 16px;
        line-height: 55px;
    }
    /* 确保音频图标可见 */
    #img_music {
        width: 32px; height: 32px;
    }
</style>

</body>
</html>
